<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <!-- VIVENTIUM START
    Purpose: Replace LibreChat branding with Viventium icons, metadata, and social share tags.
    Details: docs/requirements_and_learnings/16_Branding_and_Assets.md#librechat-index-html
    Added: 2026-02-07
    -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Viventium — Augmented Human Intelligence" />
    <meta property="og:title" content="Viventium" />
    <meta property="og:description" content="Viventium — Augmented Human Intelligence" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Viventium" />
    <meta property="og:url" content="https://viventium.ai" />
    <meta
      property="og:image"
      content="https://viventium.ai/assets/web-app-manifest-512x512.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Viventium" />
    <meta name="twitter:description" content="Viventium — Augmented Human Intelligence" />
    <meta
      name="twitter:image"
      content="https://viventium.ai/assets/web-app-manifest-512x512.png"
    />
    <title>Viventium</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="manifest" href="assets/site.webmanifest" />
    <!-- VIVENTIUM END -->
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
  </body>
</html>
