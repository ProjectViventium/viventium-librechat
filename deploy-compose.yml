services:
  api:
    # VIVENTIUM START — build the exact checked-out fork; never substitute an upstream image.
    build:
      context: .
      dockerfile: Dockerfile.multi
      target: api-build
    # VIVENTIUM END
    container_name: LibreChat-API
    ports:
      - 3080:3080
      # VIVENTIUM START — browser code executes on a dedicated loopback origin.
      - '127.0.0.1:${SANDPACK_BUNDLER_PORT:-3081}:${SANDPACK_BUNDLER_PORT:-3081}'
      # VIVENTIUM END
    depends_on:
      - mongodb
      - rag_api
    restart: always
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      # VIVENTIUM START — source/Docker API owns the isolated Sandpack listener.
      - SANDPACK_BUNDLER_LISTEN_HOST=0.0.0.0
      - SANDPACK_BUNDLER_LISTEN_PORT=${SANDPACK_BUNDLER_PORT:-3081}
      - SANDPACK_BUNDLER_URL=${SANDPACK_BUNDLER_URL:-http://localhost:3081/}
      - SANDPACK_STATIC_BUNDLER_URL=${SANDPACK_STATIC_BUNDLER_URL:-http://localhost:3081/}
      # VIVENTIUM END
    volumes:
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/api/logs

  client:
    image: nginx:1.27.0-alpine
    container_name: LibreChat-NGINX
    ports:
      - 80:80
      - 443:443
    depends_on:
      - api
    restart: always
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
  mongodb:
    container_name: chat-mongodb
    # ports:  # Uncomment this to access mongodb from outside docker, not safe in deployment
    #   - 27018:27017
    image: mongo:8.0.17
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    # ports: # Uncomment this to access meilisearch from outside docker
    #   - 7700:7700 # if exposing these ports, make sure your master key is not the default value
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data_v1.35.1:/meili_data
  vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_LOCAL_POSTGRES_PASSWORD}
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
  rag_api:
    # VIVENTIUM START — registry-verified multi-platform digest, inspected 2026-07-20.
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest@sha256:c0ad82657b556c1e16dcfca85d045788f67caa223e25e70eb687f4d16b41dedc
    # VIVENTIUM END
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

volumes:
  pgdata2:
