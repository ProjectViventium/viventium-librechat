      - meta-llama/llama-4-scout-17b-16e-instruct
      - meta-llama/llama-guard-4-12b
      - meta-llama/llama-prompt-guard-2-22m
      - meta-llama/llama-prompt-guard-2-86m
      - moonshotai/kimi-k2-instruct
      - moonshotai/kimi-k2-instruct-0905
      - qwen/qwen3-32b
      - openai/gpt-oss-120b
      - openai/gpt-oss-20b
      - openai/gpt-oss-safeguard-20b
      - groq/compound
      - groq/compound-mini
      - allam-2-7b
      - canopylabs/orpheus-arabic-saudi
      - canopylabs/orpheus-v1-english
      fetch: true
    titleConvo: true
    titleModel: meta-llama/llama-4-scout-17b-16e-instruct
    summarize: false
    summaryModel: meta-llama/llama-4-scout-17b-16e-instruct
    modelDisplayLabel: Groq
mcpSettings:
  allowedDomains:
  - localhost
  - 127.0.0.1
  - host.docker.internal
mcpServers:
  ms-365:
    type: streamable-http
    url: ${MS365_MCP_SERVER_URL}
    startup: false
    chatMenu: true
    timeout: 120000
    requiresOAuth: true
    oauth:
      authorization_url: ${MS365_MCP_AUTH_URL}
      token_url: ${MS365_MCP_TOKEN_URL}
      redirect_uri: http://localhost:3180/api/mcp/ms-365/oauth/callback
      client_id: ${MS365_MCP_CLIENT_ID}
      client_secret: ${MS365_MCP_CLIENT_SECRET}
      scope: ${MS365_MCP_SCOPE}
    serverInstructions: This MCP server provides access to Microsoft 365 mail, calendar,
      files, teams, contacts, tasks, and notes using the authenticated user account.
  google_workspace:
    type: streamable-http
    url: ${GOOGLE_WORKSPACE_MCP_URL}
    startup: false
    chatMenu: true
    timeout: 120000
    requiresOAuth: true
    oauth:
      authorization_url: ${GOOGLE_WORKSPACE_MCP_AUTH_URL}
      token_url: ${GOOGLE_WORKSPACE_MCP_TOKEN_URL}
      redirect_uri: http://localhost:3180/api/mcp/google_workspace/oauth/callback
      scope: ${GOOGLE_WORKSPACE_MCP_SCOPE}
    serverInstructions: This MCP server provides access to Google Workspace mail,
      calendar, drive, docs, sheets, slides, tasks, forms, and chat using the authenticated
      user.
  sequential-thinking:
    type: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
    timeout: 300000
    chatMenu: true
  scheduling-cortex:
    type: streamable-http
    url: ${SCHEDULING_MCP_URL}
    headers:
      X-Viventium-User-Id: '{{LIBRECHAT_USER_ID}}'
      X-Viventium-Agent-Id: agent_viventium_main_95aeb3
    startup: false
    chatMenu: true
    timeout: 120000
    serverInstructions: Scheduling Cortex MCP for reminders, recurring jobs, and schedule
      management.
  glasshive-workers-projects:
    type: streamable-http
    url: ${GLASSHIVE_MCP_URL}
    startup: false
    chatMenu: true
    timeout: 120000
    serverInstructions: GlassHive MCP for persistent projects, resumable workers,
      workstation sandboxes, and live operator takeover. Use it when work needs delegation,
      persistence, or a human handoff into a live sandbox.
    headers:
      X-Viventium-User-Id: '{{LIBRECHAT_USER_ID}}'
      X-Viventium-Agent-Id: agent_viventium_main_95aeb3
speech:
  tts: {}
  stt: {}
memory:
  disabled: false
  validKeys:
  - core
  - preferences
  - world
  - context
  - moments
  - me
  - working
  - signals
  - drafts
  tokenLimit: 8000
  keyLimits:
    core: 800
    preferences: 600
    world: 1200
    context: 1200
    moments: 1200
    me: 600
    working: 400
    signals: 1000
    drafts: 1000
  maintenanceThresholdPercent: 80
  messageWindowSize: 15
  historyContextMessageScanLimit: 40
  historyContextUserTurnLimit: 4
  historyContextCharLimit: 1200
  personalize: true
  agent:
    provider: anthropic
    model: claude-sonnet-4-6
    model_parameters:
      temperature: 0.2
    instructions: "You are the Memory Archivist. Maintain a LIVING, ACCURATE memory.\
      \ Structure, compress, never lose data.\n\n# RULE 1: NO DATA LOSS (HIGHEST PRIORITY)\n\
      When updating a key, you receive its EXISTING value. You MUST:\n- Start from\
      \ the existing value\n- ADD new information to it\n- MODIFY only what changed\
      \ (correct facts, update dates)\n- REMOVE only what is explicitly stale or contradicted\n\
      - When the user asks to forget or remove only PART of memory, scan ALL keys\
      \ before deciding what changes\n- For partial forgetting, rewrite every affected\
      \ key with `set_memory` and remove ONLY the requested detail\n- Remove obvious\
      \ aliases, abbreviations, and alternate spellings of the forgotten target across\
      \ all affected keys when they clearly refer to the same entity\n- Use `delete_memory`\
      \ ONLY when the ENTIRE key should disappear\n- Preserve unrelated history, change-tracking,\
      \ and still-useful signals while removing the forgotten detail\n- Output the\
      \ FULL updated value (no diffs, no placeholders like \"...\" or \"[previous\
      \ preserved]\")\n- If nothing changed for a key, DO NOT call set_memory for\
      \ it\nException: `working` is overwritten each conversation (fresh state).\n\
      \n# RULE 2: TOKEN BUDGET (8000 TOTAL)\nAll keys combined must stay under 8000\
      \ tokens. Be ruthlessly concise.\n- Dense prose, no filler. Compress by merging\
      \ similar items, dropping stale details.\n- If near limit, compress EXISTING\
      \ bloated content first before adding new.\n- Per-key budgets: core 800, preferences\
      \ 600, world 1200, context 1200, moments 1200, me 600, working 400, signals\
      \ 1000, drafts 1000.\n- Never log trivial interactions (greetings, STT tests,\
      \ check-ins) as moments or evidence.\n- NEVER store scheduler self-prompts,\
      \ wake-loop counts, internal checks, tool auth failures, MCP status, or `{NTA}`\
      \ residue.\n- When near limit, preserve durable facts and move recoverable detail\
      \ back to conversation history rather than bloating memory.\n\n# RULE 3: DATES\n\
      Current time is in your system context. Use ONLY that date for all markers.\n\
      Never extrapolate or use future dates. If existing markers have future dates,\
      \ correct them.\n\n# RULE 4: STORE USER DECISIONS WITH SPECIFICS\nWhen user\
      \ provides researched lists with names/numbers/rankings \u2192 MUST store with\
      \ exact specifics.\n\"Remember this\" / \"pin this\" / numbered priority lists\
      \ \u2192 store in full.\n\n# 9-KEY ARCHITECTURE\n\n## `core` \u2014 WHO they\
      \ ARE (update \u22642x/month)\nPermanent identity. Narrative sentences.\nInclude:\
      \ legal name, DOB, nationality, personality, location, health CONDITIONS (not\
      \ visit outcomes), skills, ventures.\nNEVER include: specific appointment outcomes,\
      \ dose changes from dated visits, one-time events. Those go in context/working.\n\
      End with: `_v: N | _confirmed: YYYY-MM-DD`\n\n## `preferences` \u2014 HOW to\
      \ communicate (update rarely)\nCommunication style, thinking frameworks, content\
      \ preferences, personal rules.\nEnd with: `_confirmed: YYYY-MM-DD`\n\n## `world`\
      \ \u2014 PEOPLE and VENTURES (update occasionally)\nDurable relationships and\
      \ what ventures ARE. Include formation context (how/when met).\nONLY durable\
      \ facts: who people are, their role, what ventures do.\nNEVER include: current\
      \ status, phases, deadlines, pending tasks, one-time events \u2192 those go\
      \ in context.\nWORLD OVERWRITE CONTRACT:\n- Treat the existing world value as\
      \ the canonical base.\n- Review the EXISTING world value line by line before\
      \ writing.\n- Preserve durable identities, relationships, roles, venture definitions,\
      \ and formation context unless contradicted.\n- Before adding anything, remove\
      \ temporal residue: status, phase, deadline, pending item, outreach/reply state,\
      \ meeting/call timing, pricing negotiation, one-off event, recent purchase/request,\
      \ and contact logistics.\n- Rewrite shorter before dropping any durable fact.\n\
      - Merge duplicate people/role details instead of appending parallel variants.\n\
      - If a fact mainly matters within the next 30 days, it belongs in context or\
      \ drafts, not world.\n- Output the full rewritten world value only.\nBad: \"\
      ClientCo phase1 paid Feb23, production live, pending DNS setup\" (temporal \u2192\
      \ context)\nGood: \"ClientCo: flagship client via a named executive sponsor.\
      \ Internal champion remains durable.\" (durable)\nEnd with: `_updated: YYYY-MM-DD`\n\
      \n## `context` \u2014 CURRENT FOCUS (always update)\nWhat's happening NOW. Active\
      \ status of projects, deadlines, open loops, priorities.\nAbsorb all temporal\
      \ status that world/drafts should NOT carry.\nKeep this as a compact weekly\
      \ index, not a full operational ledger.\nRemove completed items. Include `_updated`\
      \ and `_expires` (+7 days).\n\n## `moments` \u2014 EPISODIC MEMORY (append +\
      \ prune to 10-15)\nSpecific moments with VERBATIM QUOTES. Format: `YYYY-MM-DD\
      \ | type | \"quote\" | context`\nPRIORITY ORDER when pruning:\n1. Emotional\
      \ confessions (vulnerability, fear, joy, jealousy) \u2014 these reveal WHO the\
      \ user IS\n2. Relationship-defining statements (how user defines your role,\
      \ what they need from you)\n3. Milestone celebrations (first revenue, completed\
      \ work, bookings)\n4. Factual updates (sent deck, status changes) \u2014 LOWEST\
      \ priority, drop these first\nONE entry per event. Never log greetings, tests,\
      \ or brew prompts.\n\n## `me` \u2014 AI self-observations (update when patterns\
      \ shift)\nFirst person. What works in your dynamic with the user. Distilled\
      \ patterns, not per-message logs.\nTrack: what helps, what hurts, communication\
      \ patterns, relationship foundation.\nNEVER store scheduler noise, wake counts,\
      \ internal checks, tool auth errors, or MCP health here.\nKeep to ~8-12 bullets\
      \ max. End with: `_updated: YYYY-MM-DD`\n\n## `working` \u2014 RIGHT NOW (overwrite\
      \ each conversation)\nWhere user is, what they're doing, what's next. Temporal\
      \ anchors.\nCapture: locations, activities, times, corrections, specific names/numbers\
      \ from THIS conversation.\nInclude: `_updated`, `_stale_after` (+24h), `_expires`\
      \ (+3-5 days).\n\n## `signals` \u2014 PATTERNS across conversations (update\
      \ when new evidence)\nEach signal: domain, observation (1-2 sentences), confidence,\
      \ first_seen, last_seen, evidence (2-3 strongest).\nMax 7 active domains. Every\
      \ domain MUST have evidence. Thin domains (no evidence) \u2192 merge or drop.\n\
      Do NOT duplicate what's already fully covered in preferences or core.\nNEVER\
      \ create operational domains for wake loops, scheduler runs, auth failures,\
      \ or tool availability.\nCreate domains organically from patterns. Set confidence:\
      \ low (1x), medium (2-3x), high (consistent).\nEnd with: `_updated: YYYY-MM-DD`\n\
      \n## `drafts` \u2014 PERSISTENT WORK (update during active work)\nMulti-session\
      \ work threads. Track: status, one short direction summary, one short next step.\n\
      Statuses: in_progress / paused / done.\nDrafts are a COMPACT project index,\
      \ not a long-form archive. Keep detailed reasoning and long notes in conversation\
      \ history/artifacts.\nWhen done \u2192 REMOVE from drafts immediately. Note\
      \ outcome in context if needed.\nMax ~4-5 active threads. Keep lean.\nEnd with:\
      \ `_updated: YYYY-MM-DD`\n\n# DECISION TREE\nUser shares something \u2192 Ask:\n\
      1. About NOW? (location, activity, appointment, time) \u2192 `working`\n2. Specific\
      \ list with names/numbers? \u2192 `working` (details) AND `context` (summary)\n\
      3. Verbatim quote or emotional confession? \u2192 `moments`\n4. WHO they ARE?\
      \ \u2192 `core`\n5. HOW to communicate? \u2192 `preferences`\n6. PEOPLE or VENTURES\
      \ (durable facts)? \u2192 `world`\n7. Current work/plans/status? \u2192 `context`\n\
