endpoints:
  anthropic:
    titleEndpoint: anthropic
    titleModel: claude-sonnet-4-6
    titlePrompt: 'Generate a concise natural conversation title from the user''s request and the assistant''s response. Do not browse, fetch, or judge URL accessibility. If the conversation contains a URL, title the user''s intended task or outcome instead of whether the URL is accessible.

      Conversation: {convo}

      Return only one natural title under 40 characters.'
    titlePromptTemplate: 'User: {input}

      AI: {output}'
    summarize: false
    summaryModel: claude-sonnet-4-6
    modelDisplayLabel: Azure AI Foundry (Claude)
  agents:
    order: -1
    recursionLimit: 2000
    maxRecursionLimit: 2000
    disableBuilder: false
    defaultId: agent_viventium_main_95aeb3
    iconURL: /assets/logo.svg
    capabilities:
    - deferred_tools
    - programmatic_tools
    - file_search
    - web_search
    - artifacts
    - actions
    - context
    - tools
    - ocr
    - chain
    titlePrompt: 'Generate a concise natural conversation title from the user''s request and the assistant''s response. Do not browse, fetch, or judge URL accessibility. If the conversation contains a URL, title the user''s intended task or outcome instead of whether the URL is accessible.

      Conversation: {convo}

      Return only one natural title under 40 characters.'
    titlePromptTemplate: 'User: {input}

      AI: {output}'
  custom:
  - name: perplexity
    apiKey: ${PERPLEXITY_API_KEY}
    baseURL: https://api.perplexity.ai/
    models:
      default:
      - sonar-deep-research
      - sonar-reasoning-pro
      - sonar-reasoning
      - sonar-pro
      - sonar
      - r1-1776
      fetch: false
    titleConvo: true
    titleModel: sonar
    summarize: false
    summaryModel: sonar
    modelDisplayLabel: Perplexity
    dropParams:
    - stop
    - frequency_penalty
    forcePrompt: false
  - name: xai
    apiKey: ${XAI_API_KEY}
    baseURL: https://api.x.ai/v1
    models:
      default:
      - grok-4.3
      - grok-4.20-non-reasoning
      - grok-4.20-multi-agent-0309
      - grok-4.20-0309-reasoning
      - grok-4.20-0309-non-reasoning
      - grok-2-vision-1212
      - grok-2-image-1212
      fetch: true
    titleConvo: true
    titleModel: grok-4.3
    summarize: false
    summaryModel: grok-4.3
    modelDisplayLabel: Grok
    titleMethod: completion
    forcePrompt: false
  - name: openrouter
    apiKey: ${OPENROUTER_API_KEY}
    baseURL: https://openrouter.ai/api/v1
    models:
      default:
      - moonshotai/kimi-k2.5
      - moonshotai/kimi-k2
      - moonshotai/kimi-k2-0905
      fetch: false
    titleConvo: true
    titleModel: moonshotai/kimi-k2.5
    summarize: false
    summaryModel: moonshotai/kimi-k2.5
    modelDisplayLabel: OpenRouter (Kimi)
    dropParams:
    - stop
  - name: groq
    apiKey: ${GROQ_API_KEY}
    baseURL: https://api.groq.com/openai/v1/
    models:
      default:
      - meta-llama/llama-4-maverick-17b-128e-instruct
      - meta-llama/llama-4-scout-17b-16e-instruct
      - meta-llama/llama-guard-4-12b
      - meta-llama/llama-prompt-guard-2-22m
      - meta-llama/llama-prompt-guard-2-86m
      - moonshotai/kimi-k2-instruct
      - moonshotai/kimi-k2-instruct-0905
      - qwen/qwen3-32b
      - openai/gpt-oss-120b
      - openai/gpt-oss-20b
      - openai/gpt-oss-safeguard-20b
      - groq/compound
      - groq/compound-mini
      - allam-2-7b
      - canopylabs/orpheus-arabic-saudi
      - canopylabs/orpheus-v1-english
      fetch: true
    titleConvo: true
    titleModel: meta-llama/llama-4-scout-17b-16e-instruct
    summarize: false
    summaryModel: meta-llama/llama-4-scout-17b-16e-instruct
    modelDisplayLabel: Groq
mcpSettings:
  allowedDomains:
  - localhost
  - 127.0.0.1
  - host.docker.internal
mcpServers:
  ms-365:
    type: streamable-http
    url: ${MS365_MCP_SERVER_URL}
    startup: false
    chatMenu: true
    timeout: 120000
    requiresOAuth: true
    oauth:
      authorization_url: ${MS365_MCP_AUTH_URL}
      token_url: ${MS365_MCP_TOKEN_URL}
      redirect_uri: http://localhost:3180/api/mcp/ms-365/oauth/callback
      client_id: ${MS365_MCP_CLIENT_ID}
      client_secret: ${MS365_MCP_CLIENT_SECRET}
      scope: ${MS365_MCP_SCOPE}
    serverInstructions:
      promptRef: mcp.ms365.server
  google_workspace:
    type: streamable-http
    url: ${GOOGLE_WORKSPACE_MCP_URL}
    startup: false
    chatMenu: true
    timeout: 120000
    requiresOAuth: true
    oauth:
      authorization_url: ${GOOGLE_WORKSPACE_MCP_AUTH_URL}
      token_url: ${GOOGLE_WORKSPACE_MCP_TOKEN_URL}
      redirect_uri: http://localhost:3180/api/mcp/google_workspace/oauth/callback
      scope: ${GOOGLE_WORKSPACE_MCP_SCOPE}
    serverInstructions:
      promptRef: mcp.google_workspace.server
  sequential-thinking:
    type: stdio
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
    timeout: 300000
    chatMenu: true
  scheduling-cortex:
    type: streamable-http
    url: ${SCHEDULING_MCP_URL}
    headers:
      X-Viventium-User-Id: '{{LIBRECHAT_USER_ID}}'
      X-Viventium-Agent-Id: agent_viventium_main_95aeb3
    startup: false
    chatMenu: true
    timeout: 120000
    serverInstructions: true
    viventiumTrustedServerInstructions: true
  glasshive-workers-projects:
    type: streamable-http
    url: ${GLASSHIVE_MCP_URL}
    viventiumRequestContext: true
    startup: false
    chatMenu: true
    timeout: 120000
    serverInstructions: true
    viventiumTrustedServerInstructions: true
