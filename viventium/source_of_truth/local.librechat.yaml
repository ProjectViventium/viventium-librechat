version: 1.3.6
cache: true
interface:
  customWelcome: Welcome to Viventium
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  runCode: false
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  memories: true
  temporaryChat: true
  temporaryChatRetention: 24
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: false
    groups: false
    roles: false
  marketplace:
    use: false
  fileCitations: true
  webSearch: true
  fileSearch: true
  defaultAgent: agent_viventium_main_95aeb3
  remoteAgents:
    use: false
    create: false
    share: false
    public: false
  mcpServers:
    placeholder: Integrations
    use: true
    create: true
    share: false
    public: false
    trustCheckbox:
      label:
        en: I understand and want to continue
      subLabel:
        en: Only connect MCP servers you trust. Unreviewed servers can expose data
          or trigger unintended actions.
viventium:
  background_cortices:
    activation_format:
      response_format: "Respond with a JSON object:\n{\n  \"should_activate\": true,\n\
        \  \"confidence\": 1.0,\n  \"reason\": \"2-4 explanatory words\"\n}\n"
      brew_begin_tag: <!--viv_internal:brew_begin-->
  no_response:
    prompt: 'NO RESPONSE TAG:

      - If you have nothing meaningful to add, respond with exactly: {NTA}

      - When you use {NTA}, output ONLY that token and nothing else.

      - Never use {NTA} to hide errors/tool failures; explain the issue briefly instead.

      '
  conversation_recall:
    prompt: 'CONVERSATION RECALL:

      - When the user asks about prior chats, earlier context, previous decisions,
      or something mentioned before, use `file_search` to check conversation recall.

      - For exact-history questions, verify with retrieved evidence instead of guessing
      from memory alone.

      - Do not answer live mailbox, calendar, or external-system status questions
      from conversation recall alone; use the relevant live tool when available.

      '
  configVersion: 1
  primaryProvider: openai
  installMode: native
  consciousAgent:
    provider: anthropic
    model: claude-opus-4-6
balance:
  enabled: false
  startBalance: 200000
  autoRefillEnabled: true
  refillIntervalValue: 30
  refillIntervalUnit: days
  refillAmount: 200000
modelSpecs:
  prioritize: false
  list:
  - name: viventium
    label: Viventium
    description: The conscious self. Background cortices process in parallel, surfacing
      insights without blocking dialogue.
    default: true
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_main_95aeb3
  - name: agent_viventium_background_analysis_95aeb3
    label: Background Analysis
    description: Deep analytical processing - surfaces hidden meanings and logical
      gaps.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_background_analysis_95aeb3
  - name: agent_viventium_confirmation_bias_95aeb3
    label: Confirmation Bias
    description: Error detection - flags overconfidence and unchecked assumptions
      before they solidify.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_confirmation_bias_95aeb3
  - name: agent_viventium_red_team_95aeb3
    label: Red Team
    description: Evidence-first mistake detection - verifies claims, tests viability,
      and calls out rationalization.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_red_team_95aeb3
  - name: agent_viventium_deep_research_95aeb3
    label: Deep Research
    description: Multi-step research across sources, building comprehensive understanding.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_deep_research_95aeb3
  - name: agent_viventium_online_tool_use_95aeb3
    label: MS365
    description: Orchestrates MS365 productivity tool calls (Outlook email, calendar,
      OneDrive files).
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_online_tool_use_95aeb3
  - name: agent_viventium_parietal_cortex_95aeb3
    label: Parietal Cortex
    description: Mathematical, physics, and statistical reasoning using first-principles
      thinking.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_parietal_cortex_95aeb3
  - name: agent_viventium_pattern_recognition_95aeb3
    label: Pattern Recognition
    description: Identifies recurring themes, behavioral loops, and contradictions
      across conversation.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_pattern_recognition_95aeb3
  - name: agent_viventium_emotional_resonance_95aeb3
    label: Emotional Resonance
    description: Senses emotional undercurrents and unspoken needs that words don't
      capture.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_emotional_resonance_95aeb3
  - name: agent_viventium_strategic_planning_95aeb3
    label: Strategic Planning
    description: Transforms abstract goals into concrete action sequences with risk
      awareness.
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_strategic_planning_95aeb3
  - name: agent_viventium_support_95aeb3
    label: Viventium User Help
    description: "In-product help for using Viventium \u2014 conversations, voice,\
      \ agents, integrations, scheduling. Never mentions internal implementation;\
      \ escalates to the official Viventium support channel only when needed."
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_viventium_support_95aeb3
  - name: agent_8Y1d7JNhpubtvzYz3hvEv
    label: Google
    description: Orchestrates Google Workspace productivity tool calls
    iconURL: /assets/logo.svg
    preset:
      endpoint: agents
      agent_id: agent_8Y1d7JNhpubtvzYz3hvEv
  - name: gemini-3-flash-preview
    label: Gemini 3 Flash
    description: Google Gemini
    group: Google
    groupIcon: /assets/google.png
    iconURL: /assets/google.png
    preset:
      endpoint: google
      model: gemini-3-flash-preview
  - name: gemini-3-pro-preview
    label: Gemini 3 Pro
    description: Google Gemini
    group: Google
    groupIcon: /assets/google.png
    iconURL: /assets/google.png
    preset:
      endpoint: google
      model: gemini-3-pro-preview
  - name: gemini-3.1-pro
    label: Gemini 3.1 Pro
    description: Google Gemini
    group: Google
    groupIcon: /assets/google.png
    iconURL: /assets/google.png
    preset:
      endpoint: google
      model: gemini-3.1-pro-preview
  - name: claude-sonnet-4-6
    label: Claude Sonnet 4 6
    description: Anthropic Direct
    group: anthropic
    groupIcon: anthropic
    iconURL: anthropic
    preset:
      endpoint: anthropic
      model: claude-sonnet-4-6
  - name: claude-opus-4-6
    label: Claude Opus 4 6
    description: Anthropic Direct
    group: anthropic
    groupIcon: anthropic
    iconURL: anthropic
    preset:
      endpoint: anthropic
      model: claude-opus-4-6
  addedEndpoints:
  - agents
  - anthropic
  - google
  - groq
  - openrouter
  - xai
  - perplexity
  - custom
  - openAI
webSearch:
  searxngInstanceUrl: ${SEARXNG_INSTANCE_URL}
  searchProvider: searxng
  firecrawlApiKey: ${FIRECRAWL_API_KEY}
  firecrawlApiUrl: ${FIRECRAWL_API_URL}
  firecrawlVersion: ${FIRECRAWL_VERSION}
  scraperProvider: firecrawl
  scraperTimeout: 7500
  safeSearch: 1
