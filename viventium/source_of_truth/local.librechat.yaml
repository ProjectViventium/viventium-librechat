      totalSizeLimit: 100
      supportedMimeTypes: *id001
    openAI:
      disabled: false
      fileLimit: 100
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes: *id001
    google:
      disabled: false
      fileLimit: 100
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes: *id001
    agents:
      disabled: false
      fileLimit: 100
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes: *id001
    default:
      fileLimit: 100
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes: *id001
ocr:
  strategy: document_parser
endpoints:
  anthropic:
    titleEndpoint: anthropic
    titleModel: claude-sonnet-4-6
    summarize: false
    summaryModel: claude-sonnet-4-6
    modelDisplayLabel: Azure AI Foundry (Claude)
  agents:
    order: -1
    recursionLimit: 2000
    maxRecursionLimit: 2000
    disableBuilder: false
    defaultId: agent_viventium_main_95aeb3
    iconURL: /assets/logo.svg
    capabilities:
    - deferred_tools
    - programmatic_tools
    - file_search
    - web_search
    - artifacts
    - actions
    - context
    - tools
    - ocr
    - chain
  custom:
  - name: perplexity
    apiKey: ${PERPLEXITY_API_KEY}
    baseURL: https://api.perplexity.ai/
    models:
      default:
      - sonar-deep-research
      - sonar-reasoning-pro
      - sonar-reasoning
      - sonar-pro
      - sonar
      - r1-1776
