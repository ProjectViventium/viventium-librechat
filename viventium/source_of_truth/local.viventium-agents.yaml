  tool_kwargs: []
  model_parameters:
    model: claude-opus-4-7
    thinking: false
  end_after_tools: false
  hide_sequential_outputs: false
  support_contact:
    name: ''
    email: ''
  background_cortices:
    - agent_id: agent_viventium_background_analysis_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        prompt: |-
          Activate when deeper analytical thinking would meaningfully improve the response.

          ACTIVATE for:
          - User presents a plan, strategy, or decision for discussion (needs critical review, not just agreement)
          - User shares an idea and context suggests blind spots or unconsidered risks
          - Explicit requests for deeper analysis or hidden meaning
          - Situations where agreeing without thinking would be a disservice
          - Requests needing computation or code interpreter

          DO NOT ACTIVATE for:
          - Simple factual questions
          - Questions regarding memories
          - Basic requests or clarifications
          - MCP/tool calls, search, easy questions
          - Jokes or casual conversation
          - Task schedule requests, agent requests
        confidence_threshold: 0.65
        cooldown_ms: 30000
        max_history: 6
    - agent_id: agent_viventium_confirmation_bias_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        prompt: |-
          Activate when assumptions, overconfidence, or unquestioned plans need scrutiny.

          ACTIVATE for:
          - Absolute certainty without evidence: "This will definitely work", "I'm 100% sure"
          - Assumptions as facts: "Everyone knows...", "It's obvious that..."
          - Dismissing alternatives: "That's impossible", "You're wrong because..."
          - Wishful thinking as fact: "It'll work out, I just know it"
          - User presents a plan or strategy that contains unexamined assumptions or risks
          - User is excited about an idea but hasn't considered downsides

          DO NOT ACTIVATE for:
          - Questions
          - Admitting uncertainty ("I don't know", "I'm not sure")
          - Normal everyday conversation
          - Opinions stated as opinions
          - Tool calls such as scheduled tasks

          When uncertain, do NOT activate.
        confidence_threshold: 0.6
        cooldown_ms: 30000
        max_history: 6
    - agent_id: agent_viventium_red_team_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        prompt: |-
          Activate for important or big claims, plans, or assumptions need evidence-based verification.

          ACTIVATE for:
          - User states specific facts, statistics, or benchmarks without citing sources
          - User presents a plan with specific timelines or financial projections
          - User dismisses risk or says "it will work out" without evidence
          - User postpones a critical action (visa, move, launch) while optimizing comfort
          - User makes "this will definitely" or "everyone knows" type statements
          - User rationalizes staying in a comfort environment while goals require change

          DO NOT ACTIVATE for:
          - Emotional support moments (grief, frustration, vulnerability)
          - Simple factual questions the user is asking (not claiming)
          - Casual conversation, jokes, daily check-ins
          - Tool calls, scheduling, memory queries
          - Questions about how to do something

          The Confirmation Bias cortex handles broad bias checks. You handle EVIDENCE and VIABILITY.
        confidence_threshold: 0.6
        cooldown_ms: 45000
        max_history: 6
    - agent_id: agent_viventium_deep_research_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        prompt: |-
          Activate ONLY for MULTI-STEP research requiring multiple searches and synthesis.

          ACTIVATE for:
          - "Research the current state of X"
          - "Compare A vs B across multiple dimensions"
          - "What's the history of X?"
          - "Do a deep dive on..."
          - Requests explicitly using: research, investigate, deep dive, comprehensive

          DO NOT ACTIVATE for:
          - Simple lookups ("What is X?", "Who is Y?")
          - Personal questions ("What do you think about me?")
          - Email/calendar/file access
          - Memory queries
          - Tool requests
        confidence_threshold: 0.7
        cooldown_ms: 120000
        max_history: 6
    - agent_id: agent_viventium_online_tool_use_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        fallbacks:
          - provider: openai
            model: gpt-5.4
          - provider: anthropic
            model: claude-haiku-4-5
        prompt: |-
          You are a classifier. Decide whether to activate the MS365 (Microsoft) productivity tool agent.

          PRIMARY DECISION RULE:
          - The latest user message is the decisive signal for whether there is a Microsoft 365 action request.
          - Earlier conversation may clarify provider, people, or files, but it must NOT manufacture an action request when the latest user message is only about how Viventium should answer in chat.
          - A bare provider clarification such as "Outlook.", "Ms365", "Microsoft 365", "Gmail", or "Google Workspace" counts only when recent conversation already established a live inbox/email request or the assistant just asked which provider/account.
          - For those provider-only clarifications, do NOT require a new action verb in the latest turn; treat the action as inherited from the immediately relevant live email request in recent history.

          SCOPE: This agent handles ONLY Microsoft 365 / Outlook / OneDrive. It does NOT handle Google Workspace, Gmail, Google Drive, Google Docs, Google Calendar, or any Google service.

          MIXED-PROVIDER RULE:
          - If the same user message asks for BOTH Microsoft and Google actions, you should STILL activate when there is a concrete Microsoft / Outlook / MS365 action in scope.
          - Another cortex may activate in parallel for the Google portion of the same request.

          RETURN "should_activate": false WHEN:
          - The latest user message is only a chat response-format or wording instruction for Viventium itself
            Examples: "Please reply with exactly DIRECT_OK and nothing else.", "say Test Worked", "respond only with yes", "answer in one word"
          - The request is ONLY about Google / Gmail / Drive / Docs / Sheets / Calendar and contains no Microsoft / Outlook / MS365 action
          - A shared link points only to a Google domain (docs.google.com, drive.google.com, etc.) and there is no Microsoft action request
          - The user is only asking a capability question ("can you access my email?") rather than requesting an action
          - The latest user message is general conversation, AI reminders, or scheduling talk without a concrete Microsoft action request

          ACTIVATE (true) WHEN ALL of these are true:
          1. The latest user message asks for a Microsoft / Outlook / MS365 action, OR it is a provider clarification / generic inbox status question that clearly requires a live email check
          2. The action involves Outlook email, Outlook calendar, OneDrive files, Teams, Planner, or OneNote OR a generic email status check (replies, follow-up necessity, inbox scan) that could reasonably live in Outlook / MS365
          3. It is an action request (check, read, summarize, schedule, find, draft, share, create) — not just a capability question
          4. Words like "reply", "respond", "say", or "return" count only when they refer to email/content inside Microsoft 365. They do NOT count when the user is telling Viventium how to phrase its chat response.

          Examples that ACTIVATE:
          - "check my Outlook inbox" / "check my ms365 inbox"
          - "read my emails" (when conversation context is MS365/Outlook, not Gmail)
          - "did Joey email me back?"
          - "should I follow up with them, or did they already reply by email?"
          - "Check my inbox for replies from Joey." → assistant: "Gmail or Outlook?" → user: "Outlook." → true
          - Recent live email context already established, then user says "Ms365" → true
          - "what meetings do I have in Outlook today?"
          - "find files on OneDrive about..."
          - "draft an email in Outlook"
          - "check both Outlook and Gmail and summarize anything urgent" → true for the Microsoft portion

          Examples that DO NOT ACTIVATE:
          - "Please reply with exactly DIRECT_OK and nothing else." → chat response formatting, false
          - "say Test Worked" → chat response formatting, false
          - "respond only with yes" → chat response formatting, false
          - "check my Gmail" → Google, false
          - "create a Google Doc" → Google, false
          - "kick off a document in Google Workspace" → Google, false
          - "check my inbox" + user's recent context references Google → false
          - Bare "Ms365" / "Outlook." with no recent live email request or provider-question context → false
          - "who is Joey?" → not a live Microsoft action, false
          - "Can you access my email?" → capability question, no action, false
          - General conversation, scheduling, AI reminders → false
        intent_scope: productivity_ms365
        confidence_threshold: 0.7
        cooldown_ms: 60000
        max_history: 6
    - agent_id: agent_viventium_parietal_cortex_95aeb3
      activation:
        enabled: true
        model: meta-llama/llama-4-scout-17b-16e-instruct
        provider: groq
        prompt: |-
          Activate ONLY for mathematical, physics, or statistical problems.

